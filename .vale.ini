StylesPath = /Users/niko/.vale/styles

MinAlertLevel = suggestion

# Official package registry.
Packages = proselint, write-good, alex

# Ignore the frontmatter, inline code, code fences.
[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = nikoxyz, proselint, write-good

# Proselint rules that fire constantly on tech prose — tune down.
proselint.Typography = NO
proselint.But = NO
proselint.GenderBias = NO
proselint.Hedging = NO
proselint.LGBTQOffensive = NO
proselint.RASSyndrome = suggestion
proselint.Spelling = NO
proselint.Skunked = suggestion

# write-good bundles — pick the ones that actually catch AI slop.
write-good.Weasel = warning
write-good.TooWordy = warning
write-good.Passive = suggestion
write-good.So = NO
write-good.ThereIs = warning
write-good.E-Prime = NO
write-good.Illusions = warning
write-good.Cliches = warning

# Disable on fenced code blocks and inline code.
# Vale's built-in Markdown support handles this automatically for
# ```blocks and `spans`, so no explicit setting needed.
